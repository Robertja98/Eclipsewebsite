<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin Login | Eclipse Water Technologies</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body {
      font-family: 'Montserrat', sans-serif;
      background-color: #f4f4f4;
      margin: 0;
      padding: 0;
    }
    .login-box {
      max-width: 400px;
      margin: 5rem auto;
      padding: 2rem;
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    .login-box h2 {
      margin-bottom: 1rem;
      color: #0077cc;
      text-align: center;
    }
    .login-box input {
      width: 100%;
      padding: 0.65rem;
      margin-bottom: 1rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1rem;
    }
    .login-box button {
      width: 100%;
      background: teal;
      color: white;
      border: none;
      padding: 0.65rem;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      font-size: 1rem;
    }
    #error {
      color: red;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>Admin Login</h2>
    <input type="text" id="username" placeholder="Username" />
    <input type="password" id="password" placeholder="Password" />
    <button onclick="login()">Log In</button>
    <p id="error"></p>
  </div>

  <script>
    function login() {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      const validUsername = 'robertja98';
      const validPassword = 'EcL1pse';

      if (username === validUsername && password === validPassword) {
        window.location.href = 'dashboard.html';
      } else {
        document.getElementById('error').textContent = 'Invalid username or password';
      }
    }
  </script>
</body>
</html>
